<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>心词典</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f8fafc; overflow: hidden; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .horizontal-scroll { display: flex; overflow-x: auto; gap: 1rem; scroll-snap-type: x mandatory; padding-bottom: 20px; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .horizontal-scroll > div { min-width: 85vw; scroll-snap-align: center; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 100px); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 设置遮罩层 -->
    <div id="setup-overlay" class="fixed inset-0 z-50 bg-blue-600 flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm p-8 rounded-[32px] shadow-2xl text-center">
            <img src="logo.png" id="setup-logo" class="w-20 h-20 mx-auto mb-4 rounded-2xl shadow-lg">
            <h1 class="text-2xl font-bold mb-6">欢迎使用心词典</h1>
            <div class="text-left space-y-4">
                <select id="native-lang" class="w-full p-3 bg-gray-50 rounded-xl outline-none border"></select>
                <div id="target-langs-grid" class="grid grid-cols-2 gap-2"></div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">开始学习</button>
            </div>
        </div>
    </div>

    <!-- 顶部导航 -->
    <header class="p-6 pt-12 flex justify-between items-center">
        <h1 id="view-title" class="text-3xl font-bold">查单词</h1>
        <button onclick="showSettings()" class="w-10 h-10 bg-white rounded-xl shadow-sm border border-gray-100"><i class="fa-solid fa-gear text-gray-400"></i></button>
    </header>

    <!-- 主内容 -->
    <main class="flex-1 overflow-y-auto px-6 safe-bottom">
        <div id="tab-search">
            <div class="relative mb-8">
                <input id="search-input" type="text" placeholder="输入单词..." class="w-full p-4 pr-14 rounded-2xl bg-white shadow-sm border-none outline-none">
                <button onclick="handleSearch()" class="absolute right-2 top-2 w-10 h-10 bg-blue-600 text-white rounded-xl shadow-lg"><i class="fa-solid fa-search"></i></button>
            </div>
            <div id="result-container" class="horizontal-scroll">
                <div id="empty-state" class="w-full text-center py-20 text-gray-300">
                    <img src="logo.png" class="w-20 h-20 mx-auto mb-4 opacity-20">
                    <p>搜索一个词开始旅程</p>
                </div>
            </div>
        </div>

        <div id="tab-notebook" class="hidden space-y-4"></div>
        <div id="tab-flashcards" class="hidden"></div>
    </main>

    <!-- 底部导航 -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 p-6 flex justify-around items-center pb-10">
        <button onclick="switchTab('search')" id="btn-search" class="text-blue-600 text-xl"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button onclick="switchTab('notebook')" id="btn-notebook" class="text-gray-300 text-xl"><i class="fa-solid fa-book"></i></button>
        <button onclick="switchTab('flashcards')" id="btn-flashcards" class="text-gray-300 text-xl"><i class="fa-solid fa-bolt"></i></button>
    </nav>

    <script>
        // 注册 Service Worker (关键)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        const LANGUAGES = ['English', 'Chinese', 'Japanese', 'French', 'Spanish', 'German'];
        let config = JSON.parse(localStorage.getItem('h_dict_conf')) || { native: 'Chinese', targets: ['English'] };
        let notebook = JSON.parse(localStorage.getItem('h_dict_note')) || [];

        window.onload = () => {
            renderSetup();
            if(!localStorage.getItem('h_dict_conf')) document.getElementById('setup-overlay').classList.remove('hidden');
        };

        function renderSetup() {
            const grid = document.getElementById('target-langs-grid');
            const nSelect = document.getElementById('native-lang');
            grid.innerHTML = '';
            LANGUAGES.forEach(lang => {
                nSelect.add(new Option(lang, lang));
                const btn = document.createElement('div');
                btn.className = `p-3 border rounded-xl text-center text-xs font-bold cursor-pointer ${config.targets.includes(lang) ? 'bg-blue-600 text-white' : 'bg-gray-50'}`;
                btn.innerText = lang;
                btn.onclick = () => {
                    if(config.targets.includes(lang)) config.targets = config.targets.filter(t => t !== lang);
                    else config.targets.push(lang);
                    renderSetup();
                };
                grid.appendChild(btn);
            });
            nSelect.value = config.native;
        }

        function saveSettings() {
            config.native = document.getElementById('native-lang').value;
            localStorage.setItem('h_dict_conf', JSON.stringify(config));
            document.getElementById('setup-overlay').classList.add('hidden');
            location.reload();
        }

        function showSettings() { document.getElementById('setup-overlay').classList.remove('hidden'); }

        function handleSearch() {
            const val = document.getElementById('search-input').value.trim();
            if(!val) return;
            document.getElementById('result-container').innerHTML = '<p class="w-full text-center py-10 animate-pulse text-blue-500 font-bold">AI 正在加载...</p>';
            
            setTimeout(() => {
                document.getElementById('result-container').innerHTML = '';
                config.targets.forEach(lang => {
                    const card = document.createElement('div');
                    card.className = 'glass-card p-6 flex flex-col';
                    card.innerHTML = `
                        <div class="flex justify-between mb-4"><span class="text-xs font-bold text-blue-500">${lang}</span><button onclick="saveWord('${val}', '${lang}')"><i class="fa-solid fa-heart text-gray-200"></i></button></div>
                        <h2 class="text-2xl font-bold mb-4">${val}</h2>
                        <p class="text-sm text-gray-600 mb-6">这是“${val}”在 ${lang} 里的自然释义。AI 认为这个词在口语中非常常用。</p>
                        <div class="bg-blue-50 p-4 rounded-xl text-xs text-blue-700 italic border-l-4 border-blue-400">"This is an example sentence using ${val}."</div>
                    `;
                    document.getElementById('result-container').appendChild(card);
                });
            }, 600);
        }

        function saveWord(word, lang) {
            notebook.push({word, lang, id: Date.now(), nextReview: Date.now()});
            localStorage.setItem('h_dict_note', JSON.stringify(notebook));
            alert('收藏成功');
        }

        function switchTab(tab) {
            ['search', 'notebook', 'flashcards'].forEach(t => {
                document.getElementById('tab-' + t).classList.add('hidden');
                document.getElementById('btn-' + t).classList.replace('text-blue-600', 'text-gray-300');
            });
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.replace('text-gray-300', 'text-blue-600');
            document.getElementById('view-title').innerText = tab === 'search' ? '查单词' : (tab === 'notebook' ? '笔记本' : '复习');
            if(tab === 'notebook') renderNotebook();
        }

        function renderNotebook() {
            const container = document.getElementById('tab-notebook');
            container.innerHTML = notebook.map(n => `<div class="glass-card p-4 flex justify-between font-bold"><span>${n.word}</span><span class="text-blue-400 text-xs">${n.lang}</span></div>`).join('');
        }
    </script>
</body>
</html>
